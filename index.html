<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question SAY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#0f172a;
--bg2:#1e3a8a;
--glass:rgba(15,23,42,.85);
--accent:#3b82f6;
--text:#e2e8f0;
--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
height:100vh;
background:radial-gradient(circle at 20% 20%,#1e3a8a 0%,#0f172a 50%,#020617 100%);
display:flex;
justify-content:center;
align-items:center;
color:var(--text);
overflow:hidden;
}

.app{
width:100%;
max-width:1300px;
height:100vh;
display:flex;
background:var(--glass);
backdrop-filter:blur(20px);
}

.sidebar{
width:320px;
border-right:1px solid rgba(255,255,255,.05);
display:flex;
flex-direction:column;
padding:20px;
transition:.3s;
}

.logo-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-weight:800;
font-size:20px;
background:linear-gradient(90deg,#60a5fa,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#logoutBtn{
background:linear-gradient(45deg, red, lightcoral);
border:none;
padding:6px 14px;
color:white;
font-weight:600;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-size:12px;
}

#logoutBtn:hover{
transform:scale(1.07);
box-shadow:0 0 12px rgba(255,0,0,.5);
}

.search{
padding:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,.05);
color:white;
margin-bottom:15px;
}

.user-item{
padding:10px;
border-radius:10px;
cursor:pointer;
}

.user-item:hover{
background:rgba(255,255,255,.05);
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.chat-header{
padding:15px;
border-bottom:1px solid rgba(255,255,255,.05);
font-weight:600;
display:flex;
align-items:center;
gap:10px;
}

.back-btn{
display:none;
cursor:pointer;
font-size:18px;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 15px;
border-radius:15px;
font-size:14px;
word-break:break-word;
}

.me{
align-self:flex-end;
background:linear-gradient(135deg,#2563eb,#1e40af);
}

.other{
align-self:flex-start;
background:rgba(255,255,255,.05);
}

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid rgba(255,255,255,.05);
}

.input-area input{
flex:1;
padding:10px;
border-radius:15px;
border:none;
background:rgba(255,255,255,.05);
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
cursor:pointer;
}

a{
color:#60a5fa;
text-decoration:none;
}

@media(max-width:768px){
.sidebar{
position:absolute;
height:100%;
z-index:10;
left:0;
top:0;
}

.chat{
width:100%;
}

.back-btn{
display:block;
}
}
</style>
</head>
<body>

<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCGyal54VADYeaXYT82fD4dL7RJv_NjwYg",
authDomain:"question-say.firebaseapp.com",
projectId:"question-say",
storageBucket:"question-say.firebasestorage.app",
messagingSenderId:"329304423311",
appId:"1:329304423311:web:71c83bc0e462682c5b69fa"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let currentUser=null;
let currentChat=null;

const root=document.getElementById("root");

function parse(text){
text=text.replace(/\\(.)/g,"$1");
text=text.replace(/\*\*\*(.*?)\*\*\*/g,"<b><i>$1</i></b>");
text=text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>");
text=text.replace(/\*(.*?)\*/g,"<i>$1</i>");
text=text.replace(/~(.*?)~/g,"<s>$1</s>");
text=text.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
return text;
}

function loginUI(){
root.innerHTML=`
<div class="app" style="justify-content:center;align-items:center;">
<button onclick="window.location.reload()">Войти через Google</button>
</div>`;
}

async function mainUI(user){
await setDoc(doc(db,"users",user.uid),{
name:user.displayName,
uid:user.uid
},{merge:true});

root.innerHTML=`
<div class="app">
<div class="sidebar" id="sidebar">
<div class="logo-row">
<div class="logo">Question SAY</div>
<button id="logoutBtn">Выйти</button>
</div>
<input class="search" id="search" placeholder="Поиск пользователя...">
<div id="users"></div>
</div>
<div class="chat">
<div class="chat-header">
<span class="back-btn" id="backBtn">←</span>
<span id="chatName">Выберите чат</span>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
<input id="msgInput" placeholder="Сообщение...">
<button id="sendBtn">Send</button>
</div>
</div>
</div>`;

document.getElementById("logoutBtn").onclick=async()=>{
await signOut(auth);
location.reload();
};

loadUsers("");

document.getElementById("search").oninput=e=>loadUsers(e.target.value);
document.getElementById("sendBtn").onclick=send;
document.getElementById("msgInput").addEventListener("keypress",e=>{
if(e.key==="Enter")send();
});
}

async function loadUsers(filter){
const container=document.getElementById("users");
container.innerHTML="";
const snap=await getDocs(collection(db,"users"));
snap.forEach(d=>{
const u=d.data();
if(u.uid!==currentUser.uid && u.name.toLowerCase().includes(filter.toLowerCase())){
const div=document.createElement("div");
div.className="user-item";
div.textContent=u.name;
div.onclick=()=>openChat(u);
container.appendChild(div);
}
});
}

function openChat(user){
currentChat=[currentUser.uid,user.uid].sort().join("_");
document.getElementById("chatName").textContent=user.name;
const q=query(collection(db,"chats",currentChat,"messages"),orderBy("createdAt"));
onSnapshot(q,snap=>{
const box=document.getElementById("messages");
box.innerHTML="";
snap.forEach(d=>{
const data=d.data();
const div=document.createElement("div");
div.className="msg "+(data.uid===currentUser.uid?"me":"other");
div.innerHTML=parse(data.text);
box.appendChild(div);
});
box.scrollTop=box.scrollHeight;
});
}

async function send(){
const input=document.getElementById("msgInput");
if(!input.value||!currentChat)return;
await addDoc(collection(db,"chats",currentChat,"messages"),{
text:input.value,
uid:currentUser.uid,
createdAt:serverTimestamp()
});
input.value="";
}

onAuthStateChanged(auth,user=>{
if(user){
currentUser=user;
mainUI(user);
}else{
signInWithRedirect(auth,provider);
}
});
</script>

</body>
</html>
